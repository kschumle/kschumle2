    <main>
        <h2>Contact Me!</h2>
        <p>If you have any questions or suggestions for TCGs to add to the site, fill out this form and I'll get back to you as soon as possible.</p>

        <form id="contact-form" action="#" method="post">
            <div class="form-row">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="form-row">
                <label for="email">Your E-mail:</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-row">
                <label for="tcg">TCG:</label>
                <select id="tcg" name="tcg" required>
                    <option value="">Choose one</option>
                    <option value="pokemon">Pokémon</option>
                    <option value="magic">Magic the Gathering</option>
                    <option value="yugioh">Yu-Gi-Oh</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-row">
                <label for="message">Questions/Suggestions:</label>
                <textarea id="message" name="message" placeholder="Write your question or suggestions here..."></textarea>
            </div>
            <div class="form-row form-actions">
                <button type="submit">Submit</button>
            </div>
        </form>

    </main>
